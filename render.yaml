services:
  - type: web
    name: mk-ticket-itinerary
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        value: file:./mk_itinerary.db
      - key: RETENTION_DAYS
        value: 7
      - key: GEMINI_API_KEY
        sync: false
